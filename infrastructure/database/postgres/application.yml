account:
  spring:
    datasource:
      url: jdbc:postgresql://account-db:5432/accountdb
      username: ${DB_USER:?DB_USER is required}
      password: ${DB_PASSWORD:?DB_PASSWORD is required}
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
    flyway:
      enabled: true
      locations: classpath:db/migration/account

