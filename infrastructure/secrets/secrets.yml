# FinovaBank Secrets Management Configuration
#
# IMPORTANT: This file is a TEMPLATE only.
# Never store real secrets in version control.
#
# For Kubernetes: Use External Secrets Operator with Vault or AWS Secrets Manager.
# For local dev:  Copy to secrets.local.yml and populate; add to .gitignore.
# For Ansible:    Use ansible-vault encrypt_string for values in vars files (not here).
#
# Secret injection methods supported:
#   - HashiCorp Vault (recommended for production)
#   - AWS Secrets Manager
#   - Kubernetes Secrets (base64, managed by External Secrets Operator)
#   - Ansible Vault (for ansible-managed values only)

---
apiVersion: v1
kind: Secret
metadata:
  name: finovabank-secrets
  namespace: finovabank
  labels:
    app: finovabank
    environment: production
    compliance: financial-grade
  annotations:
    vault.security.banzaicloud.io/vault-addr: "https://vault.finovabank.com:8200"
    vault.security.banzaicloud.io/vault-role: "finovabank-app"
    vault.security.banzaicloud.io/vault-skip-verify: "false"
type: Opaque
data:
  # All values below are placeholders.
  # Replace with: echo -n "actual-value" | base64
  # Or use External Secrets Operator to sync from Vault/AWS Secrets Manager.

  # Database credentials
  DB_USER: <BASE64_ENCODED_DB_USER>
  DB_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>

  # MongoDB credentials
  MONGO_ROOT_USERNAME: <BASE64_ENCODED_MONGO_USERNAME>
  MONGO_ROOT_PASSWORD: <BASE64_ENCODED_MONGO_PASSWORD>

  # Redis credentials
  REDIS_PASSWORD: <BASE64_ENCODED_REDIS_PASSWORD>

  # JWT secret (must be >= 64 bytes / 512 bits for HS512)
  JWT_SECRET: <BASE64_ENCODED_JWT_SECRET>

  # AES-256 encryption key (must be exactly 32 bytes)
  ENCRYPTION_KEY: <BASE64_ENCODED_32_BYTE_KEY>

  # AWS credentials (prefer IAM roles; only set if not using instance profiles)
  AWS_ACCESS_KEY_ID: <BASE64_ENCODED_AWS_KEY_ID>
  AWS_SECRET_ACCESS_KEY: <BASE64_ENCODED_AWS_SECRET_KEY>

  # TLS certificate and key (PEM format, base64 encoded)
  TLS_CERT: <BASE64_ENCODED_TLS_CERT>
  TLS_KEY: <BASE64_ENCODED_TLS_KEY>

  # Vault token (only for dev; production uses Kubernetes auth)
  VAULT_TOKEN: <BASE64_ENCODED_VAULT_TOKEN>

  # Vault truststore password
  VAULT_TRUSTSTORE_PASSWORD: <BASE64_ENCODED_TRUSTSTORE_PASSWORD>
