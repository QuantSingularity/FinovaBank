# Example Secret Configuration
#
# Copy this file to secret.yaml and update with base64-encoded values.
# DO NOT commit secret.yaml to version control.
# Use: echo -n "your-value" | base64
#
# In production, use External Secrets Operator or Vault Agent Injector
# to inject secrets dynamically instead of managing this file manually.

apiVersion: v1
kind: Secret
metadata:
  name: finovabank-secrets
  namespace: { { .Release.Namespace } }
  labels: { { - include "finovabank.labels" . | nindent 4 } }
  annotations:
    vault.security.banzaicloud.io/vault-addr: "https://vault.finovabank.com:8200"
    vault.security.banzaicloud.io/vault-role: "finovabank-app"
    vault.security.banzaicloud.io/vault-skip-verify: "false"
type: Opaque
data:
  DB_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  MONGO_ROOT_PASSWORD: <BASE64_ENCODED_MONGO_PASSWORD>
  JWT_SECRET: <BASE64_ENCODED_JWT_SECRET_MIN_64_BYTES>
  ENCRYPTION_KEY: <BASE64_ENCODED_32_BYTE_KEY>
  REDIS_PASSWORD: <BASE64_ENCODED_REDIS_PASSWORD>
