# FinovaBank Full-Stack Docker Compose
# For local development and integration testing.
# Production deployments use Kubernetes (see kubernetes/).
#
# Usage:
#   cp .env.example .env  # then fill in your values
#   docker compose up -d
#   docker compose logs -f api-gateway

version: "3.8"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - finova-backend
  depends_on:
    eureka-server:
      condition: service_healthy
  env_file:
    - .env
  environment:
    SPRING_PROFILES_ACTIVE: docker
    EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
    DB_USER: ${DB_USER:-postgres}
    DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
    MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

services:
  # ─── Service Discovery ──────────────────────────────────────────────────────
  eureka-server:
    image: quantsingularity/finovabackend:eureka-server-latest
    container_name: finova-eureka
    ports:
      - "8761:8761"
    networks:
      - finova-backend
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8761/actuator/health",
        ]
      <<: *healthcheck-defaults
    restart: unless-stopped
    env_file:
      - .env

  # ─── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    <<: *service-defaults
    image: quantsingularity/finovabackend:api-gateway-latest
    container_name: finova-api-gateway
    ports:
      - "8002:8002"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8002/actuator/health",
        ]
      <<: *healthcheck-defaults

  # ─── Microservices ──────────────────────────────────────────────────────────
  account-management:
    <<: *service-defaults
    image: quantsingularity/finovabackend:account-management-latest
    container_name: finova-account
    ports:
      - "8095:8095"
    depends_on:
      eureka-server:
        condition: service_healthy
      account-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://account-db:5432/accountdb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8095/actuator/health",
        ]
      <<: *healthcheck-defaults

  transaction-service:
    <<: *service-defaults
    image: quantsingularity/finovabackend:transaction-service-latest
    container_name: finova-transaction
    ports:
      - "8102:8102"
    depends_on:
      eureka-server:
        condition: service_healthy
      transaction-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://transaction-db:5432/transactiondb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8102/actuator/health",
        ]
      <<: *healthcheck-defaults

  loan-management:
    <<: *service-defaults
    image: quantsingularity/finovabackend:loan-management-latest
    container_name: finova-loan
    ports:
      - "8096:8096"
    depends_on:
      eureka-server:
        condition: service_healthy
      loan-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://loan-db:5432/loandb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8096/actuator/health",
        ]
      <<: *healthcheck-defaults

  savings-goals:
    <<: *service-defaults
    image: quantsingularity/finovabackend:savings-goals-latest
    container_name: finova-savings
    ports:
      - "8101:8101"
    depends_on:
      eureka-server:
        condition: service_healthy
      savings-goals-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://savings-goals-db:5432/savingsdb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8101/actuator/health",
        ]
      <<: *healthcheck-defaults

  risk-assessment:
    <<: *service-defaults
    image: quantsingularity/finovabackend:risk-assessment-latest
    container_name: finova-risk
    ports:
      - "8100:8100"
    depends_on:
      eureka-server:
        condition: service_healthy
      risk-assessment-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://risk-assessment-db:5432/riskdb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8100/actuator/health",
        ]
      <<: *healthcheck-defaults

  compliance:
    <<: *service-defaults
    image: quantsingularity/finovabackend:compliance-latest
    container_name: finova-compliance
    ports:
      - "8097:8097"
    depends_on:
      eureka-server:
        condition: service_healthy
      compliance-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://compliance-db:5432/compliancedb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8097/actuator/health",
        ]
      <<: *healthcheck-defaults

  notification-service:
    <<: *service-defaults
    image: quantsingularity/finovabackend:notification-service-latest
    container_name: finova-notification
    ports:
      - "8098:8098"
    depends_on:
      eureka-server:
        condition: service_healthy
      notification-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notificationdb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8098/actuator/health",
        ]
      <<: *healthcheck-defaults

  reporting:
    <<: *service-defaults
    image: quantsingularity/finovabackend:reporting-latest
    container_name: finova-reporting
    ports:
      - "8099:8099"
    depends_on:
      eureka-server:
        condition: service_healthy
      reporting-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://reporting-db:5432/reportingdb
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://localhost:8099/actuator/health",
        ]
      <<: *healthcheck-defaults

  # ─── Frontend ───────────────────────────────────────────────────────────────
  finovabank-frontend:
    image: quantsingularity/finovabackend:finovabank-frontend-latest
    container_name: finova-frontend
    ports:
      - "3000:80"
    networks:
      - finova-backend
    depends_on:
      - api-gateway
    restart: unless-stopped

  # ─── PostgreSQL Databases ───────────────────────────────────────────────────
  account-db:
    image: postgres:15-alpine
    container_name: finova-account-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: accountdb
    volumes:
      - account-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/account:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d accountdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  transaction-db:
    image: postgres:15-alpine
    container_name: finova-transaction-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: transactiondb
    volumes:
      - transaction-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/transaction:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d transactiondb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  loan-db:
    image: postgres:15-alpine
    container_name: finova-loan-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: loandb
    volumes:
      - loan-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/loan:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d loandb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  savings-goals-db:
    image: postgres:15-alpine
    container_name: finova-savings-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: savingsdb
    volumes:
      - savings-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/savings:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d savingsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  risk-assessment-db:
    image: postgres:15-alpine
    container_name: finova-risk-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: riskdb
    volumes:
      - risk-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/risk:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d riskdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  compliance-db:
    image: postgres:15-alpine
    container_name: finova-compliance-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: compliancedb
    volumes:
      - compliance-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/compliance:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d compliancedb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  notification-db:
    image: postgres:15-alpine
    container_name: finova-notification-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: notificationdb
    volumes:
      - notification-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/notification:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d notificationdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  reporting-db:
    image: postgres:15-alpine
    container_name: finova-reporting-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: reportingdb
    volumes:
      - reporting-pg-data:/var/lib/postgresql/data
      - ./database/migrations/postgres/reporting:/docker-entrypoint-initdb.d:ro
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d reportingdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  account-mongodb:
    image: mongo:6.0
    container_name: finova-account-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    ports:
      - "27018:27017"
    volumes:
      - account-mongo-data:/data/db
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Redis (Cache & Sessions) ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: finova-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── HashiCorp Vault (Dev mode - secrets management) ─────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: finova-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-only-token-replace-in-prod}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - finova-backend
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Monitoring: Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: finova-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - finova-backend
      - finova-monitoring
    restart: unless-stopped

  # ─── Monitoring: Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: finova-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/finovabank.json:ro
      - grafana-data:/var/lib/grafana
    networks:
      - finova-monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # ─── ELK Stack ───────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: finova-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
      xpack.monitoring.collection.enabled: "true"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - finova-monitoring
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:9200/_cluster/health | grep -v ''"status":"red"''',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: finova-logstash
    ports:
      - "5044:5044"
    volumes:
      - ./monitoring/elk-stack/filebeat-configmap.yaml:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - finova-monitoring
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: finova-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      XPACK_SECURITY_ENABLED: "false"
    networks:
      - finova-monitoring
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:5601/api/status | grep -q 'available'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: finova-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - finova-backend
      - finova-monitoring
    depends_on:
      - api-gateway
      - finovabank-frontend
    restart: unless-stopped

networks:
  finova-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  finova-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  account-pg-data:
  transaction-pg-data:
  loan-pg-data:
  savings-pg-data:
  risk-pg-data:
  compliance-pg-data:
  notification-pg-data:
  reporting-pg-data:
  account-mongo-data:
  redis-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
