<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${subject != null ? subject : 'FinovaBank Notification'}">
      FinovaBank Notification
    </title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 30px auto;
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .header {
        background-color: #1a3c5e;
        color: #ffffff;
        padding: 24px;
        text-align: center;
      }
      .header h1 {
        margin: 0;
        font-size: 24px;
      }
      .body {
        padding: 32px;
        color: #333333;
        line-height: 1.6;
      }
      .footer {
        background-color: #f8f8f8;
        padding: 16px;
        text-align: center;
        font-size: 12px;
        color: #999999;
        border-top: 1px solid #eeeeee;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #1a3c5e;
        color: #ffffff;
        text-decoration: none;
        border-radius: 4px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>FinovaBank</h1>
      </div>
      <div class="body">
        <p th:if="${recipientName != null}">
          Dear <span th:text="${recipientName}">Customer</span>,
        </p>
        <p th:if="${message != null}" th:text="${message}">
          You have a new notification from FinovaBank.
        </p>
        <p th:if="${actionUrl != null}">
          <a
            th:href="${actionUrl}"
            class="btn"
            th:text="${actionText != null ? actionText : 'View Details'}"
            >View Details</a
          >
        </p>
      </div>
      <div class="footer">
        <p>&copy; 2025 FinovaBank. All rights reserved.</p>
        <p>This is an automated message. Please do not reply to this email.</p>
      </div>
    </div>
  </body>
</html>
