---
server:
  port: 8003

spring:
  application:
    name: account-management-service

  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8001/eureka/}
    enabled: ${EUREKA_ENABLED:false}
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-account-secret-key-minimum-64-bytes-long-for-hs512-please-change}

logging:
  level:
    com.finova: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
