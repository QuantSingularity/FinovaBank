---
server:
  port: 8004

spring:
  datasource:
    url: jdbc:h2:mem:transaction-servicedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}

logging:
  level:
    com.finova: DEBUG
    org.hibernate.SQL: DEBUG
